experiment:
  name: hidden_refactor_baseline
  seed: 42
  device: auto
  output_root: outputs/runs

dataset:
  # Mode A (ImageFolder): set train_dir and val_dir to folders with class subdirectories.
  # Mode B (Flat folder auto split): set source_dir to a folder of images.
  train_dir: data/train
  val_dir: data/val
  source_dir: data/mirflickr25k
  train_split: 0.9
  split_seed: 42
  image_size: [64, 64]
  num_workers: 4
  pin_memory: true
  preprocess:
    # To keep watermark quality/stability on mixed-size datasets,
    # resize shorter side first (keep aspect ratio), then crop to image_size.
    train_resize_short_side: 96
    val_resize_short_side: 96
    interpolation: bicubic
    antialias: true
    random_hflip_prob: 0.0

train:
  batch_size: 32
  epochs: 60
  start_epoch: 1
  lr_encoder_decoder: 0.001
  lr_discriminator: 0.001
  use_amp: true
  grad_clip_norm: 1.0
  log_interval: 10
  save_every: 1
  validate_every: 1

model:
  message_length: 60
  payload_length: 30
  encoder_blocks: 4
  encoder_channels: 64
  decoder_blocks: 7
  decoder_channels: 64
  discriminator_blocks: 3
  discriminator_channels: 64
  use_discriminator: true
  use_vgg: false
  loss_weights:
    encoder: 1.0
    decoder: 2.0
    adversarial: 1.0
    payload: 2.0

noise:
  strategy: weighted_random
  layers:
    # --- pass-through ---
    - name: identity
      probability: 0.10
      params: {}
    # --- compression / signal-processing ---
    - name: jpeg
      probability: 0.9
      params:
        yuv_keep_weights: [25, 9, 9]
    - name: wechat
      probability: 0.9
      params:
        max_long_side: 1280
        yuv_keep_weights: [20, 8, 8]
    - name: quantization
      probability: 0.9
      params:
        fourier_terms: 10
    # --- pixel-level noise ---
    - name: gaussian_noise
      probability: 0.9
      params:
        std: 0.05
    # --- spatial filtering ---
    - name: gaussian_blur
      probability: 0.10
      params:
        sigma: 1.0
    # --- image editing / erasure ---
    - name: dropout
      probability: 0.10
      params:
        keep_ratio: 0.7
    - name: crop
      probability: 0.10
      params:
        keep_ratio: 0.7
    - name: cropout
      probability: 0.15
      params:
        keep_ratio: 0.5
    # --- geometric ---
    - name: resize
      probability: 0.9
      params:
        ratio_min: 0.5
        ratio_max: 1.0
  curriculum:
    enabled: true
    schedule: []

visualization:
  sample_count: 8
  save_every: 1

logging:
  level: INFO
